<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyMDU.25 Portal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/732/732221.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; margin: 0; padding: 0; }
        .app-container { max-width: 480px; margin: 0 auto; height: 100vh; background-color: #1e293b; position: relative; }
        .menu-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); }
        #loader { position: absolute; inset: 0; background: #0f172a; z-index: 999; display: flex; justify-content: center; align-items: center; }
    </style>
    <script>
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        const skipInstall = window.location.search.includes('skipInstall=true');
        if (!isStandalone && !skipInstall) { window.location.replace('./install.html'); }
    </script>
</head>
<body class="text-white">
    <div class="app-container flex flex-col">
        <div id="loader"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500"></i></div>

        <!-- In-App Browser View -->
        <div id="iframe-view" class="absolute inset-0 bg-slate-900 z-[100] hidden flex-col transition-transform duration-300 translate-x-full">
            <div class="h-14 bg-slate-800 flex items-center px-4 border-b border-slate-700">
                <button onclick="closeInApp()" class="text-blue-400 p-2"><i class="fa-solid fa-chevron-left"></i></button>
                <h2 id="iframe-title" class="flex-grow text-center text-sm">กำลังโหลด...</h2>
            </div>
            <iframe id="app-iframe" class="w-full flex-grow border-none bg-white"></iframe>
        </div>

        <!-- Main Content -->
        <div class="w-full h-1/3 swiper bannerSwiper">
            <div class="swiper-wrapper" id="banner-container"></div>
        </div>
        <div class="w-full flex-grow p-4 -mt-6 z-10">
            <div class="grid grid-cols-3 gap-3" id="menu-container"></div>
        </div>

        <!-- Footer -->
        <div class="w-full h-16 bg-slate-800 flex justify-around items-center border-t border-slate-700">
            <button class="text-blue-400"><i class="fa-solid fa-house"></i><div class="text-[10px]">หน้าแรก</div></button>
            <button class="text-slate-400"><i class="fa-solid fa-user"></i><div class="text-[10px]">ข้อมูล</div></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzn3tcximOACljun8DPhsqpLT6E0NZ1G0qSXS5BR1J5KcL9wKq-dAasVByDrkfGo6I/exec';

        async function init() {
            const res = await fetch(`${API_URL}?action=getData`);
            const data = await res.json();
            
            // Render Banners
            document.getElementById('banner-container').innerHTML = data.banners.map(b => 
                `<div class="swiper-slide"><img src="${b.image}" class="w-full h-full object-cover"></div>`).join('');
            new Swiper(".bannerSwiper", { loop: true, autoplay: { delay: 3000 }});

            // Render Menus
            document.getElementById('menu-container').innerHTML = data.menus.map(m => 
                `<div onclick="openInApp('${m.url}', '${m.title}')" class="menu-btn aspect-square rounded-2xl flex flex-col items-center justify-center p-2 cursor-pointer">
                    <i class="${m.icon} text-2xl mb-2 text-blue-300"></i>
                    <span class="text-[9px] text-center">${m.title}</span>
                </div>`).join('');
            
            document.getElementById('loader').style.display = 'none';
        }

        function openInApp(url, title) {
            document.getElementById('iframe-title').innerText = title;
            document.getElementById('app-iframe').src = url;
            const view = document.getElementById('iframe-view');
            view.classList.remove('hidden', 'translate-x-full');
        }

        function closeInApp() {
            document.getElementById('iframe-view').classList.add('translate-x-full');
            setTimeout(() => document.getElementById('iframe-view').classList.add('hidden'), 300);
        }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
        init();
    </script>
</body>
</html>
