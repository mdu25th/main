<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyMDU.25 Portal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; }
        .app-container { max-width: 480px; margin: 0 auto; height: 100vh; background-color: #1e293b; }
        .menu-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="text-white">
    <div class="app-container flex flex-col p-4">
        <div class="py-8 text-center">
            <h1 class="text-2xl font-bold text-blue-400">MyMDU.25</h1>
            <p class="text-xs text-gray-400">ระบบปฏิบัติการอัจฉริยะ นพค.25</p>
        </div>
        <div id="menu-grid" class="grid grid-cols-3 gap-3">
            <!-- Menus will be rendered here -->
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzn3tcximOACljun8DPhsqpLT6E0NZ1G0qSXS5BR1J5KcL9wKq-dAasVByDrkfGo6I/exec';

        async function fetchMenus() {
            try {
                const res = await fetch(`${API_URL}?action=getData`);
                const data = await res.json();
                const grid = document.getElementById('menu-grid');
                grid.innerHTML = data.menus.map(m => `
                    <div onclick="window.open('${m.url}', '_blank')" class="menu-btn aspect-square rounded-2xl flex flex-col items-center justify-center p-2 cursor-pointer hover:bg-slate-700">
                        <i class="${m.icon} text-2xl mb-2 text-blue-300"></i>
                        <span class="text-[9px] text-center">${m.title}</span>
                    </div>
                `).join('');
            } catch (e) { console.error('Fetch error:', e); }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
        
        fetchMenus();
    </script>
</body>
</html>
